name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install .

      # ponytail: import smoke only — the full 1.x compat + generated test
      # suites live in the iconik-sdk-generator repo and run there.
      - name: Import smoke test (generated + 1.x compat surfaces)
        working-directory: ${{ runner.temp }}
        run: |
          python -c "from pythonik.client import PythonikClient"
          python -c "from pythonik.assets import Client"
          python -c "import pythonik; print(pythonik.__version__)"
