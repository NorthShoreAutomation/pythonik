name: Version Check

on:
  pull_request:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "pythonik/__init__.py"

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Check versions match
        run: |
          VERSION_TOML=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          VERSION_INIT=$(python -c "import re; print(re.search(r'__version__ = \"(.+?)\"', open('pythonik/__init__.py').read()).group(1))")
          if [ "$VERSION_TOML" != "$VERSION_INIT" ]; then
            echo "Version mismatch: pyproject.toml ($VERSION_TOML) != __init__.py ($VERSION_INIT)"
            exit 1
          fi
